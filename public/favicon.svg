<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cosmicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#cosmicGrad)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="35" fill="url(#cosmicGrad)" opacity="0.3"/>
  
  <!-- Star symbol -->
  <path d="M50 15 L55 40 L80 40 L60 55 L68 80 L50 65 L32 80 L40 55 L20 40 L45 40 Z"
        fill="url(#goldGrad)" filter="url(#glow)"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="url(#goldGrad)" filter="url(#glow)"/>
</svg>